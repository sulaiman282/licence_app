<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Spider Licence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { dark: { bg: '#0f172a', card: '#1e293b', hover: '#334155' } } } }
        }
    </script>
</head>
<body class="bg-dark-bg text-gray-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-dark-card rounded-2xl shadow-2xl max-w-md w-full border border-gray-700">
        <div class="bg-gradient-to-r from-purple-600 to-blue-600 p-8 rounded-t-2xl text-center">
            <h1 class="text-3xl mb-2" style="font-weight: 800; letter-spacing: -0.5px;">
                <span style="color: #ef4444;">Spider</span> Licence
            </h1>
            <p class="text-white/80 text-sm">License & History Management</p>
        </div>
        
        <div class="p-8">
            <h2 class="text-2xl font-bold mb-6 text-center">Welcome Back</h2>
            
            <form id="loginForm" class="space-y-4" autocomplete="off">
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Email</label>
                    <input type="email" id="email" required autocomplete="off"
                           class="w-full bg-dark-hover border border-gray-600 rounded-lg px-4 py-3 text-sm focus:ring-2 focus:ring-purple-500 focus:border-transparent">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Password</label>
                    <input type="password" id="password" required autocomplete="off"
                           class="w-full bg-dark-hover border border-gray-600 rounded-lg px-4 py-3 text-sm focus:ring-2 focus:ring-purple-500 focus:border-transparent">
                </div>
                
                <div id="errorMsg" class="hidden bg-red-900/50 border border-red-700 text-red-200 px-4 py-3 rounded-lg text-sm"></div>
                
                <button type="submit" id="loginBtn"
                        class="w-full bg-gradient-to-r from-purple-600 to-blue-600 hover:opacity-90 text-white font-semibold py-3 rounded-lg transition">
                    <i class="bi bi-box-arrow-in-right mr-2"></i>Login
                </button>
            </form>
            
            <div class="mt-6 text-center text-xs text-gray-500">
                <p>Enter your credentials to continue</p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            const loginBtn = document.getElementById('loginBtn');
            
            errorMsg.classList.add('hidden');
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="bi bi-hourglass-split mr-2"></i>Logging in...';
            
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('email', data.email);
                    window.location.href = '/';
                } else {
                    errorMsg.textContent = data.error || 'Login failed';
                    errorMsg.classList.remove('hidden');
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = '<i class="bi bi-box-arrow-in-right mr-2"></i>Login';
                }
            } catch (error) {
                errorMsg.textContent = 'Network error. Please try again.';
                errorMsg.classList.remove('hidden');
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="bi bi-box-arrow-in-right mr-2"></i>Login';
            }
        });
    </script>
</body>
</html>
